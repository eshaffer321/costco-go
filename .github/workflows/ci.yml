name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Check go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version consistency across constants.go, CHANGELOG.md, and README.md
        run: |
          CONST_VERSION=$(grep -oP 'Version = "\K[^"]+' pkg/costco/constants.go)
          CHANGELOG_VERSION=$(grep -m1 -oP '## \[\K[^\]]+' CHANGELOG.md)
          README_VERSION=$(grep -oP 'version-\K[0-9]+\.[0-9]+\.[0-9]+' README.md | head -1)

          echo "constants.go : $CONST_VERSION"
          echo "CHANGELOG.md : $CHANGELOG_VERSION"
          echo "README.md    : $README_VERSION"

          if [ "$CONST_VERSION" != "$CHANGELOG_VERSION" ] || [ "$CONST_VERSION" != "$README_VERSION" ]; then
            echo ""
            echo "Version mismatch! All three must agree."
            echo "Update constants.go, CHANGELOG.md, and README.md to the same version before merging."
            exit 1
          fi

          echo "All versions consistent: $CONST_VERSION"

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.21', '1.22']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: |
          go build -v ./...
          go build -v -o costco-cli ./cmd/costco-cli

      - name: Test binary
        run: ./costco-cli -help || true
        if: runner.os != 'Windows'

      - name: Test binary (Windows)
        run: ./costco-cli.exe -help || true
        if: runner.os == 'Windows'